<!DOCTYPE html>
<html>
<head>
  <title>Email Template</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif;">

  <table width="100%" bgcolor="#f4f4f4" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">

        <!-- Main Container -->
        <table width="600" bgcolor="#ffffff" cellpadding="20" cellspacing="0">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color:#4CAF50; color:white;">
              <h1>Big Sale 🎉</h1>
            </td>
          </tr>

          <!-- Image -->
          <tr>
            <td align="center">
              <img src="./illustration-red-color-paper-sale-label-with-shadow_91128-760.avif" width="100%" alt="Sale Banner">
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td align="center">
              <h2>Up to 50% OFF</h2>
              <p>Grab the best deals on electronics and fashion.</p>
            </td>
          </tr>

          <!-- Button -->
          <tr>
            <td align="center">
              <a href="#" 
                 style="background-color:#4CAF50; color:white; padding:12px 20px; text-decoration:none; border-radius:5px; font-size:16px; display:inline-block;">
                 Shop Now
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="font-size:12px; color:gray;">
              <p>You are receiving this email because you subscribed.</p>
              <p><a href="#">Unsubscribe</a></p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
